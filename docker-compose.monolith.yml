# ──────────────────────────────────────────────
# Nutribot Backend — Docker Compose (Monolito)
#
# Todo en un solo container: API + Workers
# Usar este para desarrollo o VPS con pocos recursos.
#
# Para producción desacoplada, usa docker-compose.yml
# ──────────────────────────────────────────────
services:
  nutribot-redis:
    image: redis:7-alpine
    container_name: nutribot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - easypanel-nutribot
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    volumes:
      - nutribot-redis-data:/data

  nutribot-backend:
    build: .
    container_name: nutribot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NUTRIBOT_MODE=monolith
    depends_on:
      nutribot-redis:
        condition: service_healthy
    networks:
      - easypanel-nutribot
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nutribot-redis-data:

networks:
  easypanel-nutribot:
    external: true
